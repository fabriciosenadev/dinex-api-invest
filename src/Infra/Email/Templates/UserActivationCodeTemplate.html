<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codigo de ativacao - DinEx</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f7fb;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2937;
    }

    .wrapper {
      width: 100%;
      padding: 24px 0;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      background: #163a9b;
      color: #ffffff;
      padding: 20px 24px;
      font-size: 20px;
      font-weight: 700;
    }

    .content {
      padding: 24px;
      line-height: 1.55;
      font-size: 15px;
    }

    .code-box {
      margin: 16px 0;
      padding: 14px 16px;
      border: 1px dashed #8ea3c8;
      border-radius: 8px;
      background: #f8fbff;
      text-align: center;
      font-size: 28px;
      letter-spacing: 4px;
      font-weight: 700;
      color: #0f2a73;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #4b5563;
    }

    .footer {
      padding: 16px 24px 22px;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid #eef2f7;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">Ativacao de conta - DinEx</div>
      <div class="content">
        <p>Ola, {{full_name}}.</p>
        <p>Use o codigo abaixo para ativar sua conta:</p>

        <div class="code-box">{{activation_code}}</div>

        <p class="hint">
          Este codigo e valido por <strong>2 horas</strong> a partir do envio deste e-mail.
        </p>

        <p>
          Se voce nao solicitou este cadastro, ignore esta mensagem.
        </p>
      </div>
      <div class="footer">
        DinEx • Mensagem automatica. Nao responda este e-mail.
      </div>
    </div>
  </div>
</body>
</html>
